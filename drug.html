<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Drug Compatibility | Pharmasense</title>

    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
    />
  </head>

  <body>
    <header class="sub-header">
      <a href="dashboard.html" class="back">
        <i class="fas fa-arrow-left"></i>
      </a>

      <h2><i class="fas fa-shield-alt orange"></i> Drug Compatibility</h2>
    </header>

    <section id="drug-check">
      <h1>Check Drug Interactions</h1>

      <p class="subtitle">Analyze compatibility between multiple medications</p>

      <div class="drug-box">
        <h3>Add Medications</h3>
        <p class="small-text">Enter at least 2 medications to analyze</p>

        <div class="drug-input">
          <input type="text" id="drugInput" placeholder="Enter medication" />
          <button onclick="addDrug()">Add</button>
        </div>

        <div id="drugList"></div>

        <button id="checkBtn" class="check-btn" disabled>
          Check Compatibility
        </button>
      </div>
    </section>

    <script>
      let medications = [];

      function addDrug() {
        const input = document.getElementById("drugInput");
        const drugName = input.value.trim();

        if (drugName === "") return;

        // prevent duplicates
        if (medications.includes(drugName.toLowerCase())) {
          alert("Medication already added.");
          input.value = "";
          return;
        }

        medications.push(drugName.toLowerCase());

        const drugList = document.getElementById("drugList");

        const drugBox = document.createElement("div");
        drugBox.className = "added-drug";

        drugBox.innerHTML = `
    <span>${drugName}</span>
    <i class="fas fa-times"></i>
  `;

        // delete medication
        drugBox.querySelector("i").onclick = function () {
          drugBox.remove();
          medications = medications.filter((m) => m !== drugName.toLowerCase());
          updateButton();
        };

        drugList.appendChild(drugBox);

        input.value = "";

        updateButton();
      }

      function updateButton() {
        const checkBtn = document.getElementById("checkBtn");

        if (medications.length >= 2) {
          checkBtn.disabled = false;
          checkBtn.style.opacity = "1";
        } else {
          checkBtn.disabled = true;
          checkBtn.style.opacity = "0.5";
        }
      }

      // allow ENTER key
      document
        .getElementById("drugInput")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            addDrug();
          }
        });
    </script>
  </body>
</html>
